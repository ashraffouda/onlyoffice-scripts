name: onlyoffice

networks:
  onlyoffice:
    driver: bridge

volumes:
  cs_data:
  cs_logs:
  cs_letsencrypt:
  ds_data:
  ds_logs:
  ds_cache:
  mysql_data:
  redis_data:
  caddy_data:
  caddy_config:

services:
  mysql:
    image: mysql:8.0
    container_name: onlyoffice-mysql
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --max_connections=1000
      --max_allowed_packet=1048576000
      --group_concat_max_len=2048
      --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: onlyoffice
      MYSQL_USER: onlyoffice
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [onlyoffice]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: onlyoffice-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks: [onlyoffice]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  documentserver:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-documentserver
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_HEADER: "AuthorizationJwt"
      JWT_IN_BODY: "true"
    volumes:
      - ds_data:/var/www/onlyoffice/Data
      - ds_logs:/var/log/onlyoffice
      - ds_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
    networks: [onlyoffice]
    expose: ["80"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  communityserver:
    image: onlyoffice/communityserver:latest
    container_name: onlyoffice-communityserver
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      documentserver: { condition: service_started }
    environment:
      MYSQL_SERVER_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_SERVER_DB_NAME: onlyoffice
      MYSQL_SERVER_HOST: mysql
      MYSQL_SERVER_PORT: "3306"
      MYSQL_SERVER_USER: onlyoffice
      MYSQL_SERVER_PASS: ${MYSQL_PASSWORD}
      REDIS_SERVER_HOST: redis
      REDIS_SERVER_PORT: "6379"
      REDIS_SERVER_DB_NUMBER: "0"
      REDIS_SERVER_PASSWORD: ${REDIS_PASSWORD}
      DOCUMENT_SERVER_PORT_80_TCP_ADDR: documentserver
      DOCUMENT_SERVER_JWT_ENABLED: "true"
      DOCUMENT_SERVER_JWT_SECRET: ${JWT_SECRET}
      DOCUMENT_SERVER_JWT_HEADER: "AuthorizationJwt"
    volumes:
      - cs_data:/var/www/onlyoffice/Data
      - cs_logs:/var/log/onlyoffice
      - cs_letsencrypt:/etc/letsencrypt
    networks: [onlyoffice]
    expose: ["80", "443", "5222"]
    ports:
      - "5222:5222"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  caddy:
    image: caddy:2-alpine
    container_name: onlyoffice-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ONLYOFFICE_DOMAIN: ${ONLYOFFICE_DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [onlyoffice]
    depends_on:
      - communityserver
      - documentserver
